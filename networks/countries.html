                  nodes = new vis.DataSet([{"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "Japan", "label": "Japan", "shape": "dot", "size": 28.0, "title": "Japan\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "China", "label": "China", "shape": "dot", "size": 28.0, "title": "China\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "Saudi Arabia", "label": "Saudi Arabia", "shape": "dot", "size": 28.0, "title": "Saudi Arabia\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "India", "label": "India", "shape": "dot", "size": 28.0, "title": "India\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "Netherlands", "label": "Netherlands", "shape": "dot", "size": 28.0, "title": "Netherlands\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "Germany", "label": "Germany", "shape": "dot", "size": 28.0, "title": "Germany\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "Slovenia", "label": "Slovenia", "shape": "dot", "size": 28.0, "title": "Slovenia\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "Italy", "label": "Italy", "shape": "dot", "size": 28.0, "title": "Italy\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "Switzerland", "label": "Switzerland", "shape": "dot", "size": 28.0, "title": "Switzerland\u003cbr\u003epapers: 1"}, {"color": "#97c2fc", "font": {"color": "#1e293b"}, "id": "Austria", "label": "Austria", "shape": "dot", "size": 28.0, "title": "Austria\u003cbr\u003epapers: 1"}]);

                  nodeColors = {};

                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
